{% extends 'base.html' %}
{% block content %}
  <h1>Audit Log</h1>
  <table>
    <thead><tr><th>Timestamp</th><th>User ID</th><th>Action</th><th>Target</th></tr></thead>
    <tbody>
      {% for log in logs %}
      <tr>
        <td>{{ log.timestamp.strftime('%Y-%m-%d %H:%M:%S') }}</td>
        <td>{{ log.user_id }}</td>
        <td>{{ log.action }}</td>
        <td>{{ log.target_type or '-' }} {{ log.target_id or '' }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
{% endblock %}
